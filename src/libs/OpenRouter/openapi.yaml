    "/analytics/query": {
      "post": {
        "operationId": "query-analytics",
        "summary": "Query analytics data",
        "description": "Execute an analytics query with specified metrics, dimensions, filters, and time range. [Management key](/docs/guides/overview/auth/management-api-keys) required.",
        "tags": [
          "subpackage_betaAnalytics"
        ],
        "parameters": [],
        "responses": {
          "200": {
            "description": "Analytics query results",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/beta.Analytics_queryAnalytics_Response_200"
                }
              }
            }
          },
          "400": {
            "description": "Bad Request - Invalid request parameters or malformed input",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/BadRequestResponse"
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized - Authentication required or invalid credentials",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/UnauthorizedResponse"
                }
              }
            }
          },
          "403": {
            "description": "Forbidden - Authentication successful but insufficient permissions",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ForbiddenResponse"
                }
              }
            }
          },
          "408": {
            "description": "Request Timeout - Operation exceeded time limit",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/RequestTimeoutResponse"
                }
              }
            }
          },
          "500": {
            "description": "Internal Server Error - Unexpected server error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/InternalServerResponse"
                }
              }
            }
          }
        },
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "dimensions": {
                    "type": "array",
                    "items": {
                      "type": "string"
                    }
                  },
                  "filters": {
                    "type": "array",
                    "items": {
                      "$ref": "#/components/schemas/AnalyticsQueryPostRequestBodyContentApplicationJsonSchemaFiltersItems"
                    }
                  },
                  "granularity": {
                    "type": "string",
                    "description": "Time granularity"
                  },
                  "group_limit": {
                    "type": "integer",
                    "description": "Maximum rows per distinct combination of dimensions. When omitted on time-series queries (granularity + dimensions), auto-computed to avoid truncating time windows. Explicit values override the default and may truncate time buckets if set lower than the number of buckets in the range. Ignored when no dimensions are specified."
                  },
                  "limit": {
                    "type": "integer",
                    "description": "Maximum total rows returned. Defaults to 1000. On time-series queries with dimensions and no explicit group_limit, the server may raise this to accommodate the expected number of unique time-bucket/dimension combinations."
                  },
                  "metrics": {
                    "type": "array",
                    "items": {
                      "type": "string"
                    }
                  },
                  "order_by": {
                    "$ref": "#/components/schemas/AnalyticsQueryPostRequestBodyContentApplicationJsonSchemaOrderBy"
                  },
                  "time_range": {
                    "$ref": "#/components/schemas/AnalyticsQueryPostRequestBodyContentApplicationJsonSchemaTimeRange"
                  }
                },
                "required": [
                  "metrics"
                ]
              }
            }
          }
        }
      }
    },
    "/byok": {
      "get": {
        "operationId": "list-byok-keys",
        "summary": "List BYOK provider credentials",
        "description": "List the bring-your-own-key (BYOK) provider credentials for the authenticated entity's default workspace. Use the `workspace_id` query parameter to scope the result to a different workspace, or the `provider` query parameter to filter by upstream provider. [Management key](/docs/guides/overview/auth/management-api-keys) required.",
        "tags": [
          "subpackage_byok"
        ],
        "parameters": [
          {
            "name": "offset",
            "in": "query",
            "description": "Number of records to skip for pagination",
            "required": false,
            "schema": {
              "type": "integer"
            }
          },
          {
            "name": "limit",
            "in": "query",
            "description": "Maximum number of records to return (max 100)",
            "required": false,
            "schema": {
              "type": "integer"
            }
          },
          {
            "name": "workspace_id",
            "in": "query",
            "description": "Optional workspace ID to filter by. Defaults to the authenticated entity's default workspace.",
            "required": false,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          },
          {
            "name": "provider",
            "in": "query",
            "description": "Optional provider slug to filter by (e.g. `openai`, `anthropic`, `amazon-bedrock`).",
            "required": false,
            "schema": {
              "$ref": "#/components/schemas/ByokGetParametersProvider"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "List of BYOK credentials",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ListBYOKKeysResponse"
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized - Authentication required or invalid credentials",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/UnauthorizedResponse"
                }
              }
            }
          },
          "500": {
            "description": "Internal Server Error - Unexpected server error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/InternalServerResponse"
                }
              }
            }
          }
        }
      },
